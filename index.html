<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parkindle - El Reto Diario</title>
  </head>
  <body>
    <div id="game-wrapper">
      <header>
        <h1>🚗 Parkindle</h1>
        <p>Aparca sin rozar nada. Un nivel nuevo cada día.</p>
      </header>
      
      <div id="canvas-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="result-modal" class="hidden">
          <h2 id="modal-title">¡Aparcado!</h2>
          <p id="modal-desc">Has superado el reto de hoy.</p>
          <div class="stats">
            <div>
              <span id="streak-count">0</span>
              <span>Racha 🔥</span>
            </div>
          </div>
          <button id="share-btn">Copiar Resultado 📋</button>
          <p class="countdown">Próximo nivel en: <span id="time-left">--:--:--</span></p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
